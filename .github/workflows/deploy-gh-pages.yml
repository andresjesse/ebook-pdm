name: Deploy to GitHub Pages (Docusaurus Native SSH)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ACTIONS_DEPLOY_KEY }}

      - name: Build and Deploy
        env:
          # O Docusaurus precisa destas variáveis para o script de deploy
          GIT_USER: andresjesse
          # Força o uso de SSH em vez de HTTPS
          USE_SSH: true
        run: |
          # Configura o Git para confiar no host do GitHub
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

          git config --global user.name "andresjesse"
          git config --global user.email "andresjesse@users.noreply.github.com"

          # Executa o comando nativo do Docusaurus
          yarn deploy
